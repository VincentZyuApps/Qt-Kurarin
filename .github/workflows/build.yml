name: Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_publish_pypi: ${{ steps.flags.outputs.should_publish_pypi }}
      version: ${{ steps.flags.outputs.version }}
      raw_version: ${{ steps.flags.outputs.raw_version }}
      pypi_version: ${{ steps.flags.outputs.pypi_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 - <<'PY' > version.env
          import tomllib
          import re
          from pathlib import Path

          def normalize(version: str) -> str:
              version = re.sub(r"\+.*$", "", version)
              version = re.sub(r"-alpha\.?(\d+)", r"a\1", version, flags=re.IGNORECASE)
              version = re.sub(r"-beta\.?(\d+)", r"b\1", version, flags=re.IGNORECASE)
              version = re.sub(r"-rc\.?(\d+)", r"rc\1", version, flags=re.IGNORECASE)
              version = re.sub(r"-dev\.?(\d+)", r".dev\1", version, flags=re.IGNORECASE)
              return version

          data = tomllib.loads(Path("python/pyproject.toml").read_text(encoding="utf-8"))
          raw = data["project"]["version"]
          public = normalize(raw)
          print(f"RAW_VERSION={raw}")
          print(f"PYPI_VERSION={public}")
          PY

          source version.env
          VERSION="v${PYPI_VERSION}"
          echo "raw_version=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "pypi_version=$PYPI_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Raw version : $RAW_VERSION"
          echo "📦 PyPI version: $PYPI_VERSION"
          echo "📦 Tag version : $VERSION"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_pypi=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUILD=false
          PUBLISH_PYPI=false
          MSG="$COMMIT_MSG"

          if echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          if echo "$MSG" | grep -qiE "pypi publish|publish pypi"; then
            BUILD=true
            PUBLISH_PYPI=true
          fi

          echo "should_build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "should_publish_pypi=$PUBLISH_PYPI" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$BUILD publish_pypi=$PUBLISH_PYPI"

  build:
    name: Build Python package
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.12

      - name: Normalize version for PyPI build
        working-directory: python
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          raw_version = "${{ needs.check.outputs.raw_version }}"
          pypi_version = "${{ needs.check.outputs.pypi_version }}"
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          updated = re.sub(
              rf'(?m)^version\s*=\s*"{re.escape(raw_version)}"$',
              f'version = "{pypi_version}"',
              text,
              count=1,
          )
          if text == updated:
              raise SystemExit(f"Failed to rewrite version from {raw_version} to {pypi_version}")
          pyproject.write_text(updated, encoding="utf-8", newline="\n")
          print(f"Normalized version: {raw_version} -> {pypi_version}")
          PY

      - name: Build distributions
        working-directory: python
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: [check, build]
    if: needs.check.outputs.should_publish_pypi == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: python/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
